name: Architecture Check

on:
  pull_request:

jobs:
  architecture-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate project references only
        shell: bash
        run: |
          set -euo pipefail

          DOMAIN='src/SWFC.Domain/SWFC.Domain.csproj'
          APP='src/SWFC.Application/SWFC.Application.csproj'
          INFRA='src/SWFC.Infrastructure/SWFC.Infrastructure.csproj'
          WEB='src/SWFC.Web/SWFC.Web.csproj'

          grep -q 'SWFC.Infrastructure' "$DOMAIN" && { echo "Domain must not reference Infrastructure"; exit 1; }
          grep -q 'SWFC.Web' "$DOMAIN" && { echo "Domain must not reference Web"; exit 1; }
          grep -q 'SWFC.Infrastructure' "$APP" && { echo "Application must not reference Infrastructure"; exit 1; }
          grep -q 'SWFC.Web' "$APP" && { echo "Application must not reference Web"; exit 1; }

          echo "Architecture check passed."