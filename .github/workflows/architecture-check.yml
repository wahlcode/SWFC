name: Architecture Check

on:
  pull_request:

jobs:
  architecture-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate project references
        shell: bash
        run: |
          DOMAIN='src/SWFC.Domain/SWFC.Domain.csproj'
          APP='src/SWFC.Application/SWFC.Application.csproj'
          INFRA='src/SWFC.Infrastructure/SWFC.Infrastructure.csproj'
          WEB='src/SWFC.Web/SWFC.Web.csproj'

          if grep -q 'SWFC.Infrastructure' "$DOMAIN"; then
            echo "Domain must not reference Infrastructure"
            exit 1
          fi

          if grep -q 'SWFC.Web' "$DOMAIN"; then
            echo "Domain must not reference Web"
            exit 1
          fi

          if grep -q 'SWFC.Infrastructure' "$APP"; then
            echo "Application must not reference Infrastructure"
            exit 1
          fi

          if grep -q 'SWFC.Web' "$APP"; then
            echo "Application must not reference Web"
            exit 1
          fi

          if ! grep -q 'SWFC.Domain' "$APP"; then
            echo "Application must reference Domain"
            exit 1
          fi

          if ! grep -q 'SWFC.Domain' "$INFRA"; then
            echo "Infrastructure must reference Domain"
            exit 1
          fi

          if ! grep -q 'SWFC.Application' "$INFRA"; then
            echo "Infrastructure must reference Application"
            exit 1
          fi

          if grep -q 'SWFC.Domain' "$WEB"; then
            echo "Web must not reference Domain directly"
            exit 1
          fi

      - name: Ensure no @layout is used in Pages
        shell: bash
        run: |
          if grep -R -n --include="*.razor" "@layout" src/SWFC.Web/Pages; then
            echo "Forbidden '@layout' usage found in Pages."
            exit 1
          fi

      - name: Ensure no @page is used in Components
        shell: bash
        run: |
          if grep -R -n --include="*.razor" "@page" src/SWFC.Web/Components; then
            echo "Forbidden '@page' usage found in Components."
            exit 1
          fi

      - name: Ensure NavMenu is not used
        shell: bash
        run: |
          if grep -R -n --include="*.razor" "NavMenu" src/SWFC.Web; then
            echo "NavMenu usage is not allowed."
            exit 1
          fi

      - name: Ensure legacy MainLayout CSS does not exist
        shell: bash
        run: |
          if [ -f "src/SWFC.Web/Components/Layout/MainLayout.razor.css" ]; then
            echo "Legacy MainLayout.razor.css is not allowed."
            exit 1
          fi

      - name: Ensure legacy Routes.razor does not exist
        shell: bash
        run: |
          if [ -f "src/SWFC.Web/Components/Routes.razor" ]; then
            echo "Legacy Components/Routes.razor is not allowed."
            exit 1
          fi
      - name: Run architecture tests
        run: dotnet test tests/SWFC.Architecture.Tests