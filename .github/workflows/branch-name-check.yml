name: Branch Name Check

on:
  pull_request:

jobs:
  branch-name-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"

          if [[ ! "$BRANCH" =~ ^(feature|fix|chore|refactor|test)/M[0-9]{3,4}\.[0-9]{2}-[a-z0-9-]+$ ]]; then
            echo "Invalid branch name: $BRANCH"
            exit 1
          fi