name: SWFC CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test architecture project
        run: dotnet test tests/SWFC.Architecture.Tests/SWFC.Architecture.Tests.csproj --no-build --filter "FullyQualifiedName!~DocumentationTraceabilityTests&FullyQualifiedName!~DocumentationDrivenArchitectureTests&FullyQualifiedName!~ModuleSpecificRuleTests"