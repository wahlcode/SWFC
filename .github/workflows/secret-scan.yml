name: Secret Scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for Secrets
        run: |
          echo "Running secret scan..."

          # Nur relevanten Code scannen
          FILES=$(git ls-files '*.cs' '*.json' '*.config' '*.yml')

          # Regex: case-insensitive + präzise Keys
          PATTERN='(?i)\b(password|pwd|apikey|api_key|secret|token)\b\s*=\s*["'\'']?.+["'\'']?'

          MATCHES=$(grep -P -n "$PATTERN" $FILES || true)

          if [ ! -z "$MATCHES" ]; then
            echo "❌ Secrets detected:"
            echo "$MATCHES"
            exit 1
          fi

          echo "✅ No secrets found"