name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan for obvious committed secret values
        shell: bash
        run: |
          set -euo pipefail
          echo "Running relaxed secret scan..."

          if grep -RInE \
            --exclude-dir=.git \
            --exclude-dir=bin \
            --exclude-dir=obj \
            --exclude-dir=.vs \
            --exclude='*.Designer.cs' \
            '("(ClientSecret|Password|ApiKey|Token|Secret)"[[:space:]]*:[[:space:]]*"[^"$\{\}][^"]{7,}")' \
            .; then
              echo "Potential real secret value detected."
              exit 1
          fi

          echo "Secret scan passed."