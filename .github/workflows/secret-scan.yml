name: Secret Scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan tracked source files for secrets
        shell: bash
        run: |
          set -euo pipefail

          echo "Running secret scan..."

          mapfile -t FILES < <(
            git ls-files \
              '*.cs' \
              '*.json' \
              '*.config' \
              '*.yml' \
              '*.yaml' \
            | grep -Ev '(^|/)(bin|obj|node_modules|wwwroot/lib)/'
          )

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No relevant files found"
            exit 0
          fi

          SECRET_KEY_PATTERN='(^|[^A-Za-z0-9_])(password|pwd|api[_-]?key|secret|token|clientsecret|client_secret|accesskey|access_key)([^A-Za-z0-9_]|$)[[:space:]]*[:=][[:space:]]*["'\'']?[^"'\''][^"'\'']+'
          CONNECTION_STRING_PATTERN='(?i)(connectionstrings?|connectionstring)[^[:cntrl:]]*(password|pwd|user id|userid|user name|username)[[:space:]]*='
          CONNECTION_CREDENTIAL_PATTERN='(?i)\b(host|server|data source)[^[:cntrl:]]*;\s*(user id|userid|user name|username|uid)\s*=[^;]+;\s*(password|pwd)\s*='

          MATCHES=$(
            grep -nHEi \
              -e "$SECRET_KEY_PATTERN" \
              -e "$CONNECTION_STRING_PATTERN" \
              -e "$CONNECTION_CREDENTIAL_PATTERN" \
              "${FILES[@]}" || true
          )

          if [ -n "$MATCHES" ]; then
            echo "❌ Potential secrets detected:"
            echo "$MATCHES"
            exit 1
          fi

          echo "✅ No secrets found"