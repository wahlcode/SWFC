name: Commit Message Check

on:
  pull_request:

jobs:
  commit-message-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate commit messages
        uses: actions/github-script@v7
        with:
          script: |
            const forbidden = ["test", "wip", "fix", "update", "asdf", "123"];

            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const invalid = commits.data.filter(c => {
              const message = c.commit.message.split('\n')[0].trim();
              const normalized = message.toLowerCase();

              if (!message) return true;
              if (message.length < 8) return true;
              if (forbidden.includes(normalized)) return true;
              if (message.split(/\s+/).length < 2) return true;

              return false;
            });

            if (invalid.length > 0) {
              core.setFailed(
                "Invalid commit messages:\n" +
                invalid
                  .map(c => "- " + c.sha.substring(0, 7) + " " + c.commit.message.split('\n')[0])
                  .join('\n')
              );
            }